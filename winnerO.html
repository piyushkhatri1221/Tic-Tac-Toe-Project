<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner Celebration</title>
<style>
    body {
        height: 100vh;
        width: 100%;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-image: url("winbck.avif");
        background-size: cover;
        background-repeat: no-repeat;
        overflow: hidden;
        position: relative;
        font-family: 'Arial', sans-serif;
    }

    h1 {
        margin: 0px;
        color: #fff;
        font-size: 80px;
        font-weight: bold;
        text-align: center;
        padding: 30px 60px;
        border: 4px solid #FFD700;
        border-radius: 50px;
        background: linear-gradient(145deg, #FF4081, #FFC107);
        box-shadow: 0 0 20px #FFC107, 0 0 40px #FF4081, 0 0 60px #FFFFFF;
        animation: glow 2s ease-in-out infinite alternate;
        z-index: 10;
    }

    @keyframes glow {
        0% {
            box-shadow: 0 0 10px #FFC107, 0 0 20px #FF4081, 0 0 30px #FFFFFF;
        }
        100% {
            box-shadow: 0 0 30px #FFC107, 0 0 60px #FF4081, 0 0 100px #FFFFFF;
        }
    }
    .flake {
        position: absolute;
        color: #fff;
        font-size: 20px;
        user-select: none;
        pointer-events: none;
        z-index: 5;
    }

</style>
</head>
<body>
<h1>O</h1>
<h1>🎉!!!The Winner!!!🎉</h1>

<script>
    const flakeCount = 50;

    function createFlake() {
        const flake = document.createElement('div');
        flake.classList.add('flake');
        const symbols = ['❄', '🎊', '✨', '⭐', '🎉'];
        flake.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];

        flake.style.left = Math.random() * window.innerWidth + 'px';
        flake.style.fontSize = 15 + Math.random() * 30 + 'px';
        flake.style.opacity = Math.random();
        
        document.body.appendChild(flake);

        let top = -50;
        const speed = 1 + Math.random() * 3;
        const drift = Math.random() * 2 - 1;

        function fall() {
            top += speed;
            const left = parseFloat(flake.style.left) + drift;
            flake.style.top = top + 'px';
            flake.style.left = left + 'px';

            if (top > window.innerHeight) {
                top = -50;
                flake.style.left = Math.random() * window.innerWidth + 'px';
            }
            requestAnimationFrame(fall);
        }

        fall();
    }

    for (let i = 0; i < flakeCount; i++) {
        createFlake();
    }
</script>

</body>
</html>
